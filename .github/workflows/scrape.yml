name: Scrape Rollsportfeld Schedule

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to push index.html back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit when the file actually changed
          git diff --staged --quiet || git commit -m "chore: update Rollsportfeld schedule [$(date -u +%Y-%m-%d)]"
          git push
